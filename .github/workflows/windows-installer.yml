name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: "Upload installer artifact (consumes Actions storage)"
        required: false
        default: "false"
      tesseract_win_url:
        description: "Optional override for UB Mannheim Tesseract installer URL"
        required: false
        default: ""
      tess_langs:
        description: "Tesseract languages to bundle (e.g. eng+por)"
        required: false
        default: "eng+por"
      tessdata_variant:
        description: "tessdata variant: fast or best"
        required: false
        default: "fast"
  push:
    tags:
      - "v*"

permissions:
  actions: write
  contents: write

concurrency:
  group: windows-installer-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Create venv and install Python deps
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python -m pip install --upgrade pip
          .\.venv\Scripts\python -m pip install -r requirements.txt

      - name: Install Electron app deps
        working-directory: examples/electron_app
        shell: pwsh
        run: npm install

      - name: Build Windows installer (full)
        working-directory: examples/electron_app
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Optional override; if empty, script uses its default URL.
          TESSERACT_WIN_URL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tesseract_win_url || '' }}
          TESS_LANGS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tess_langs || 'eng+por' }}
          TESSDATA_VARIANT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tessdata_variant || 'fast' }}
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            Write-Host "Build attempt $attempt/3"
            if (Test-Path dist) {
              Remove-Item -Recurse -Force dist -ErrorAction SilentlyContinue
            }
            npm run dist:win:full
            if ($LASTEXITCODE -eq 0) {
              break
            }
            if ($attempt -eq 3) {
              exit $LASTEXITCODE
            }
            Start-Sleep -Seconds 20
          }

      - name: Cleanup old installer artifacts
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifact == 'true')
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const artifactName = "DocumentsReader-windows-installer";
            const keepLatest = 3;

            const artifacts = await github.paginate(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            const target = artifacts
              .filter((a) => a.name === artifactName)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            core.info(`Found ${target.length} artifacts named ${artifactName}`);

            for (const oldArtifact of target.slice(keepLatest)) {
              await github.rest.actions.deleteArtifact({
                owner,
                repo,
                artifact_id: oldArtifact.id,
              });
              core.info(`Deleted artifact #${oldArtifact.id} (${oldArtifact.name})`);
            }

      - name: Upload installer artifact
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.upload_artifact == 'true')
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: DocumentsReader-windows-installer
          retention-days: 2
          if-no-files-found: error
          path: |
            examples/electron_app/dist/*.exe

      - name: Create GitHub Release (tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            examples/electron_app/dist/*.exe
            examples/electron_app/dist/*.blockmap
            examples/electron_app/dist/*.yml
